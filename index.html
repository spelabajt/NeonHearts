<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Neon Hearts</title>
    <link rel="icon" href="img/ic.png">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #120a2a url('img/ozadje.jpg') no-repeat center center fixed; 
            background-size: cover; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        #menu-container { 
            background: rgba(25, 10, 50, 0.9); padding: 30px 50px; border-radius: 30px; 
            color: white; text-align: center; box-shadow: 0 0 40px rgba(181, 109, 255, 0.2); 
            border: 2px solid rgba(181, 109, 255, 0.4); backdrop-filter: blur(10px);
            max-width: 500px; width: 100%;
        }
        #naslov { color: #b56dff; font-size: 50px; font-family: "Orbitron", sans-serif; text-shadow: 0 0 10px #8A2BE2, 0 0 20px #b56dff; margin-bottom: 5px; letter-spacing: 4px; }
        
        #nickname-wrapper { margin-bottom: 25px; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        #nick-edit-mode { display: flex; gap: 10px; }
        #nick-input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid #00d4ff; border-radius: 10px;
            padding: 8px 15px; color: white; font-family: "Orbitron", sans-serif;
            text-align: center; outline: none; transition: 0.3s; width: 180px;
        }
        #save-nick-btn {
            background: #00d4ff; border: none; border-radius: 10px; color: #120a2a;
            padding: 0 15px; cursor: pointer; font-family: "Orbitron", sans-serif; font-size: 12px;
            font-weight: bold; transition: 0.3s;
        }
        #nick-display-mode { display: none; align-items: center; gap: 15px; font-family: "Orbitron", sans-serif; color: #fff; font-size: 18px; }
        .edit-icon { color: #00d4ff; cursor: pointer; font-size: 16px; transition: 0.3s; }

        #podnaslov { font-family: "Orbitron", sans-serif; font-size: 14px; color: #b56dff; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        
        .level-grid { display: flex; flex-direction: column; gap: 15px; }
        .level-btn { 
            padding: 18px; font-size: 18px; font-family: "Orbitron", sans-serif; font-weight: bold; 
            background: rgba(255, 105, 180, 0.05); border: 2px solid #FF69B4; color: #FF69B4; 
            border-radius: 15px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; 
            text-decoration: none; display: block; outline: none;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
        }
        .level-btn.l2 { border-color: #00d4ff; color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .level-btn.l3 { border-color: #2ecc71; color: #2ecc71; box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        
        .level-btn.locked { 
            border-color: #444 !important; color: #666 !important; 
            background: rgba(50, 50, 50, 0.2) !important; 
            cursor: not-allowed !important; opacity: 0.6; 
            box-shadow: none !important;
        }

        .footer-btns { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .small-btn { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-stats { font-size: 11px; margin-top: 8px; font-weight: normal; display: flex; justify-content: center; gap: 10px; opacity: 0.9; }

        .swal2-confirm.swal2-styled, .swal2-cancel.swal2-styled { border: none !important; color: white !important; font-family: 'Orbitron', sans-serif !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
       <source src="music/BackM.m4a" type="audio/mp4"> 
    </audio>

    <div id="menu-container">
        <div id="naslov">NEON HEARTS</div>
        
        <div id="nickname-wrapper">
            <div id="nick-edit-mode">
                <input type="text" id="nick-input" placeholder="ENTER USERNAME" maxlength="12">
                <button id="save-nick-btn" onclick="saveNickname()">SAVE</button>
            </div>
            <div id="nick-display-mode">
                <span id="player-name-text"></span>
                <i class="fas fa-pen edit-icon" onclick="editNickname()"></i>
            </div>
        </div>

        <div id="podnaslov">Choose Your Mission</div>

        <div class="level-grid">
            <a href="html/c1.html" class="level-btn" id="btn-l1">
                Level 1 <div class="btn-stats">PTS: <span id="p1">-</span> | TIME: <span id="t1">--:--</span></div>
            </a>
            <a href="html/c2.html" class="level-btn l2" id="btn-l2">
                Level 2 <div class="btn-stats">PTS: <span id="p2">-</span> | TIME: <span id="t2">--:--</span></div>
            </a>
            <a href="html/c3.html" class="level-btn l3" id="btn-l3">
                Level 3 <div class="btn-stats">PTS: <span id="p3">-</span> | TIME: <span id="t3">--:--</span></div>
            </a>
        </div>

        <div class="footer-btns">
            <button class="small-btn" onclick="showLeaderboard()">Leaderboard</button>
            <button class="small-btn" onclick="resetProgress()">Reset Progress</button>
        </div>
    </div>

    <script>
        const swalBase = { background: 'rgba(25, 10, 50, 0.95)', color: '#fff', backdrop: 'rgba(0,0,0,0.8)', heightAuto: false };
        const audio = document.getElementById('bgMusic');

        // Funkcija za zagon glasbe
        function startMusic() {
            if (audio) {
                audio.volume = 0.04; // 20% glasnost (potiho)
                audio.play().catch(e => console.log("Čakam na interakcijo za zvok."));
            }
        }

        // Poslušalci za aktivacijo zvoka ob prvem kliku
        document.addEventListener('click', function musicHandler() {
            startMusic();
            document.removeEventListener('click', musicHandler);
        }, { once: true });

        $(document).ready(function() {
            // Sejna logika
            if (window.name === "") {
                localStorage.removeItem('activeUser');
                window.name = "neon_hearts_session";
            }

            let activeNick = localStorage.getItem('activeUser');
            if (activeNick) {
                applyNickUI(activeNick);
            } else {
                updateStatsUI(null);
            }
        });

        function formatTime(s) {
            if (!s || s == 0) return "--:--";
            let mins = Math.floor(s / 60).toString().padStart(2, '0');
            let secs = (s % 60).toString().padStart(2, '0');
            return mins + ":" + secs;
        }

        function applyNickUI(nick) {
            $("#player-name-text").text(nick);
            $("#nick-edit-mode").hide();
            $("#nick-display-mode").css("display", "flex");
            updateStatsUI(nick);
        }

        function updateStatsUI(nick) {
            // Privzeto zakleni L2 in L3
            $("#btn-l2, #btn-l3").addClass("locked").on("click", function(e) {
                if ($(this).hasClass("locked")) e.preventDefault();
            });
            
            if (!nick) {
                for(let i=1; i<=3; i++) { $("#p"+i).text("-"); $("#t"+i).text("--:--"); }
                return;
            }

            let lastUnlocked = 1;
            for (let i = 1; i <= 3; i++) {
                let pts = localStorage.getItem('hmission_tocke_' + nick + '_l' + i);
                let sek = localStorage.getItem('hmission_sekunde_' + nick + '_l' + i);
                
                if (pts !== null) {
                    $("#p" + i).text(pts);
                    $("#t" + i).text(formatTime(parseInt(sek)));
                    lastUnlocked = i + 1; 
                } else {
                    $("#p" + i).text("-");
                    $("#t" + i).text("--:--");
                }
            }

            // Odklepanje
            if (lastUnlocked >= 2) $("#btn-l2").removeClass("locked").off("click");
            if (lastUnlocked >= 3) $("#btn-l3").removeClass("locked").off("click");
        }

        function saveNickname() {
            let nick = $("#nick-input").val().trim().toUpperCase();
            if (nick.length > 0) {
                startMusic(); // Sproži glasbo ob shranjevanju
                localStorage.setItem('activeUser', nick); 
                applyNickUI(nick);
            } else {
                Swal.fire({...swalBase, title: 'ERROR', text: 'Enter username!', icon: 'error', confirmButtonColor: '#FF69B4'});
            }
        }

        function editNickname() {
            $("#nick-display-mode").hide();
            $("#nick-edit-mode").css("display", "flex");
            $("#nick-input").focus();
        }

        function showLeaderboard() {
            let activeNick = localStorage.getItem('activeUser') || "YOU";
            let leaderboard = [
                { name: "CYBER_PUNK", pts: 150, time: "02:15" },
                { name: "NEON_QUEEN", pts: 135, time: "02:40" },
                { name: "VOID_WALKER", pts: 110, time: "03:05" }
            ];

            let allKeys = Object.keys(localStorage);
            let userNames = new Set();
            allKeys.forEach(key => {
                if (key.startsWith('hmission_tocke_')) {
                    let name = key.split('_').slice(2, -1).join('_');
                    userNames.add(name);
                }
            });

            userNames.forEach(name => {
                let finalPts = 0;
                let finalSeconds = 0;

                let p3 = localStorage.getItem('hmission_tocke_'+name+'_l3');
                let p2 = localStorage.getItem('hmission_tocke_'+name+'_l2');
                let p1 = localStorage.getItem('hmission_tocke_'+name+'_l1');

                if (p3 !== null) {
                    finalPts = parseInt(p3);
                    finalSeconds = parseInt(localStorage.getItem('hmission_sekunde_'+name+'_l3')) || 0;
                } else if (p2 !== null) {
                    finalPts = parseInt(p2);
                    finalSeconds = parseInt(localStorage.getItem('hmission_sekunde_'+name+'_l2')) || 0;
                } else if (p1 !== null) {
                    finalPts = parseInt(p1);
                    finalSeconds = parseInt(localStorage.getItem('hmission_sekunde_'+name+'_l1')) || 0;
                }

                if (!leaderboard.some(l => l.name === name)) {
                    leaderboard.push({ 
                        name: name, pts: finalPts, time: formatTime(finalSeconds), isMe: (name === activeNick) 
                    });
                }
            });

            leaderboard.sort((a, b) => b.pts - a.pts);

            let tableHtml = `<div style="max-height: 300px; overflow-y: auto;"><table style="width:100%; color:white; border-collapse: collapse; font-family: 'Orbitron'; font-size: 13px;">
                <tr style="border-bottom: 2px solid #b56dff; color: #b56dff;">
                    <th style="padding:10px;">POS</th><th style="padding:10px;">PLAYER</th><th style="padding:10px;">PTS</th><th style="padding:10px;">TIME</th>
                </tr>`;
            leaderboard.forEach((p, index) => {
                let style = p.isMe ? "color: #00d4ff; background: rgba(0, 212, 255, 0.1); font-weight: bold;" : "";
                tableHtml += `<tr style="${style} border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <td style="padding:10px;">${index + 1}</td>
                    <td style="padding:10px;">${p.name}${p.isMe ? ' (ME)' : ''}</td>
                    <td style="padding:10px;">${p.pts}</td>
                    <td style="padding:10px;">${p.time}</td>
                </tr>`;
            });
            tableHtml += `</table></div>`;

            Swal.fire({...swalBase, title: 'LEADERBOARD', html: tableHtml, confirmButtonText: 'CLOSE', confirmButtonColor: '#FF69B4'});
        }

        function resetProgress() {
            Swal.fire({
                ...swalBase, title: 'RESET ALL?', text: "This will delete every score!", icon: 'warning', iconColor: '#00d4ff',
                showCancelButton: true, confirmButtonText: 'YES', confirmButtonColor: '#b56dff', cancelButtonText: 'NO', cancelButtonColor: '#FF69B4', reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) { 
                    localStorage.clear(); 
                    sessionStorage.clear();
                    window.name = ""; 
                    location.reload(); 
                }
            });
        }
    </script>
</body>
</html>
