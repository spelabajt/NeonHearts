<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crystals</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #120a2a url('img/ozadje.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        #menu-container { 
            background: rgba(25, 10, 50, 0.9); 
            padding: 50px 60px; 
            border-radius: 30px; 
            color: white; 
            text-align: center; 
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.3); 
            border: 2px solid rgba(181, 109, 255, 0.4); 
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
        }

        #naslov { 
            color: #b56dff; /* Roza naslov */
            font-size: 50px; 
            font-family: "Orbitron", sans-serif; 
            text-shadow: 0 0 10px #8A2BE2, 0 0 20px #b56dff;
            margin-bottom: 10px; 
            letter-spacing: 4px; 
        }

        #podnaslov {
            font-family: "Orbitron", sans-serif;
            font-size: 14px;
            color: #b56dff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .level-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .level-btn { 
            padding: 20px; 
            font-size: 20px; 
            font-family: "Orbitron", sans-serif; 
            font-weight: bold; 
            background: rgba(255, 105, 180, 0.05); 
            border: 2px solid #FF69B4; /* Roza obroba */
            color: #FF69B4; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
            text-decoration: none;
            display: block;
            outline: none;
        }

        .level-btn:hover { 
            background: #FF69B4; 
            color: white; 
            box-shadow: 0 0 25px #FF69B4; 
            transform: scale(1.05); 
        }

        /* Level 2 ostane moder/vijoličen za kontrast */
        .level-btn.l2 {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .level-btn.l2:hover {
            background: #00d4ff;
            color: #120a2a;
            box-shadow: 0 0 25px #00d4ff;
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="naslov">NEON HEARTS</div>
        <div id="podnaslov">Choose Your Mission</div>

        <div class="level-grid">
            <a href="c1.html" class="level-btn">
                Level 1
                <div style="font-size: 10px; margin-top: 5px; opacity: 0.9;">Hearts Mission</div>
            </a>

            <a href="c2.html" class="level-btn l2">
                Level 2
                <div style="font-size: 10px; margin-top: 5px; opacity: 0.9;">Rotating Hearts</div>
            </a>
        </div>

    </div>

    <script>
        $(document).mousemove(function(e) {
            var moveX = (e.pageX * -1 / 60);
            var moveY = (e.pageY * -1 / 60);
            $('body').css('background-position', moveX + 'px ' + moveY + 'px');
        });
    </script>
</body>
</html>
