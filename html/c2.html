<!DOCTYPE html>
<html>
<head>
    <title>Hearts Mission - Level 2</title>
    <link rel="icon" href="../img/icon.png">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100% !important; margin: 0; padding: 0 !important; overflow: hidden !important; }
        body { background: #120a2a url('../img/ozadje.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 50px; height: 100%; }
        #side-info { width: 350px; display: flex; flex-direction: column; align-items: center; }
        #vmesnik { background: rgba(25, 10, 50, 0.85); padding: 20px 20px 35px 20px; border-radius: 20px; color: white; text-align: center; width: 100%; box-shadow: 0 0 20px rgba(181, 109, 255, 0.3); border: 1px solid rgba(181, 109, 255, 0.4); backdrop-filter: blur(5px); }
        #naslov { color: #b56dff; font-size: 36px; font-family: "Orbitron", sans-serif; text-shadow: 0 0 10px #8A2BE2, 0 0 20px #b56dff; margin-bottom: 25px; letter-spacing: 2px; }
        .stats-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .stat-row { font-size: 14px; font-family: "Orbitron", sans-serif; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        #cas-box, #tocke-box { border: 1px solid; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; display: inline-block; min-width: 60px; font-size: 14px; text-align: center; }
        #cas-box { border-color: #FF69B4; color: #FF69B4; }
        #tocke-box { border-color: #00d4ff; color: #00d4ff; }
        #controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 12px 25px; font-size: 18px; font-family: "Orbitron", sans-serif; font-weight: bold; background: transparent; border: 2px solid #b56dff; color: #b56dff; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; outline: none; }
        .btn:hover { background: #b56dff; color: white; box-shadow: 0 0 15px #b56dff; transform: translateY(-2px); }
        #btn-stop { border-color: #00d4ff; color: #00d4ff; }
        #btn-stop:hover { background: #00d4ff; color: #120a2a; }
        #btn-end { border-color: #FF69B4; color: #FF69B4; }
        #btn-end:hover { background: #FF69B4; color: white; }
        .btn-green { border-color: #2ecc71; color: #2ecc71; }
        .btn-green:hover { background: #2ecc71; color: #120a2a; box-shadow: 0 0 15px #2ecc71; }
        .button-row { display: flex; gap: 10px; width: 100%; }
        .button-row .btn { flex: 1; padding: 10px 5px; font-size: 13px; }
        #canvas-wrapper { padding: 20px; background: rgba(181, 109, 255, 0.1); border-radius: 30px; display: none; align-items: center; justify-content: center; }
        #canvas { display: block; background: hsl(250, 25%, 12%); border: 4px solid hsl(300, 70%, 55%); cursor: none; border-radius: 20px; }
    </style>
    <script>
        var ctx, canvas, WIDTH, HEIGHT, intervalId, timerId;
        var x, y, dx, dy, r, paddlex;
        var paddleh = 15, paddlew = 200;
        
        // KONSTANTE ZA OPEKE (Srčke)
        var bricks, NROWS = 3, NCOLS = 12, BRICKWIDTH, BRICKHEIGHT, PADDING = 10, OFFSET = 20;
        
        var shranjeneTocke = parseInt(localStorage.getItem("hmission_tocke")) || 0;
        var shranjeneSekunde = parseInt(localStorage.getItem("hmission_sekunde")) || 0;

        var gameRunning = false, sekunde = shranjeneSekunde, tocke = shranjeneTocke, izpisTimer = "00:00";
        var rightPressed = false, leftPressed = false;
        var crystalImages = {}, loadedImages = 0, totalImages = 4;

        // --- ZVOK KONFIGURACIJA ---
        var bgMusic = new Audio('../music/BackM.m4a');
        bgMusic.loop = true;
        bgMusic.volume = 0.02;

        var hitSoundEffect = new Audio('../music/zogica.m4a');
        hitSoundEffect.preload = 'auto';

        function playHitSound() {
            var sound = hitSoundEffect.cloneNode();
            sound.volume = 0.9;
            sound.play().catch(e => console.log("Zvok blokiran"));
        }

        function loadImages() {
            for (let i = 1; i <= totalImages; i++) {
                let img = new Image();
                img.src = '../img_srce/s' + i + '.png';
                img.onload = function() { loadedImages++; };
                crystalImages[i] = img;
            }
        }

        const swalCustom = { background: 'rgba(25, 10, 50, 0.95)', color: '#fff', confirmButtonColor: '#8A2BE2', backdrop: 'rgba(0,0,0,0.8)', iconColor: '#FF69B4', heightAuto: false };

        function drawIt() {
            canvas = document.getElementById('canvas'); ctx = canvas.getContext('2d');
            WIDTH = window.innerWidth - 800; HEIGHT = window.innerHeight - 200;
            canvas.width = WIDTH; canvas.height = HEIGHT;
            
            // Izračun velikosti srčkov
            BRICKWIDTH = ((WIDTH - (2 * OFFSET)) / NCOLS) - PADDING; 
            BRICKHEIGHT = BRICKWIDTH; 
            
            x = WIDTH / 2; y = HEIGHT - 50; dx = 3; dy = -5; r = 10;
            paddlex = WIDTH / 2 - paddlew / 2;
            
            initbricks();
            loadImages();
            
            $("#tocke").html(tocke); 
            posodobiIzpisTimerja();

            $(document).mousemove(function(e) {
                if(!gameRunning) return;
                var relativeX = e.pageX - $(canvas).offset().left;
                if (relativeX > paddlew / 2 && relativeX < WIDTH - paddlew / 2) paddlex = relativeX - paddlew / 2;
            });

            $(document).keydown(function(e) {
                if (e.keyCode == 39) rightPressed = true; 
                else if (e.keyCode == 37) leftPressed = true;
                else if (e.keyCode == 13) startGame(); 
                else if (e.keyCode == 32) { e.preventDefault(); if (gameRunning) stopGame(); else startGame(); }
            });
            $(document).keyup(function(e) { if (e.keyCode == 39) rightPressed = false; else if (e.keyCode == 37) leftPressed = false; });
        }

        function initbricks() {
            bricks = new Array(NROWS);
            for (var i = 0; i < NROWS; i++) {
                bricks[i] = new Array(NCOLS);
                for (var j = 0; j < NCOLS; j++) bricks[i][j] = { status: Math.floor(Math.random() * 4) + 1 };
            }
        }

        function drawbricks() {
            for (var i = 0; i < NROWS; i++) {
                for (var j = 0; j < NCOLS; j++) {
                    var b = bricks[i][j];
                    if (b.status > 0) {
                        var bx = j * (BRICKWIDTH + PADDING) + OFFSET;
                        var by = i * (BRICKHEIGHT + PADDING) + OFFSET;
                        ctx.save();
                        ctx.translate(bx + BRICKWIDTH / 2, by + BRICKHEIGHT / 2);
                        ctx.rotate((b.status - 1) * 90 * Math.PI / 180);
                        if (loadedImages >= totalImages) {
                            ctx.drawImage(crystalImages[b.status], -BRICKWIDTH/2, -BRICKHEIGHT/2, BRICKWIDTH, BRICKHEIGHT);
                        } else {
                            ctx.fillStyle = "#b56dff";
                            ctx.fillRect(-BRICKWIDTH/2, -BRICKHEIGHT/2, BRICKWIDTH, BRICKHEIGHT);
                        }
                        ctx.restore();
                    }
                }
            }
        }

        function draw() {
            if (rightPressed && paddlex < WIDTH - paddlew) paddlex += 8; else if (leftPressed && paddlex > 0) paddlex -= 8;
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawbricks();
            
            ctx.save();
            ctx.shadowBlur = 25; ctx.shadowColor = "#FF66FF";
            ctx.beginPath();
            ctx.fillStyle = "#FF00FF";
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#FFF0FF"; ctx.lineWidth = 1.2; ctx.stroke();
            ctx.restore(); 

            ctx.beginPath(); 
            ctx.fillStyle = "#8A2BE2"; 
            ctx.roundRect(paddlex, HEIGHT - paddleh, paddlew, paddleh, 10); 
            ctx.fill();
            
            var hit = false;
            for (var i = 0; i < NROWS; i++) {
                for (var j = 0; j < NCOLS; j++) {
                    var b = bricks[i][j];
                    if (b.status > 0) {
                        var bx = j * (BRICKWIDTH + PADDING) + OFFSET;
                        var by = i * (BRICKHEIGHT + PADDING) + OFFSET;
                        
                        if (x + r > bx && x - r < bx + BRICKWIDTH && y + r > by && y - r < by + BRICKHEIGHT) {
                            dy = -dy; 
                            b.status -= 1; 
                            tocke++; 
                            $("#tocke").html(tocke);
                            
                            playHitSound();

                            if (preveriZmago()) { winGame(); return; }
                            hit = true; break; 
                        }
                    }
                }
                if (hit) break;
            }

            if (x + dx > WIDTH - r || x + dx < r) dx = -dx;
            if (y + dy < r) dy = -dy;
            else if (y + dy > HEIGHT - r - paddleh) {
                if (x > paddlex && x < paddlex + paddlew) { 
                    dy = -dy; 
                    dx = 8 * ((x - (paddlex + paddlew / 2)) / paddlew); 
                }
                else if (y + dy > HEIGHT - r) gameOver();
            }
            x += dx; y += dy;
        }

        function startGame() { 
            if (!gameRunning) { 
                $("#canvas-wrapper").css("display", "flex"); 
                gameRunning = true; 
                bgMusic.play().catch(e => console.log("Glasba blokirana do klika"));
                clearInterval(intervalId);
                clearInterval(timerId);
                intervalId = setInterval(draw, 10); 
                timerId = setInterval(posodobiTimer, 1000); 
            } 
        }

        function stopGame() { gameRunning = false; clearInterval(intervalId); clearInterval(timerId); /*bgMusic.pause();*/ }
        function posodobiTimer() { sekunde++; posodobiIzpisTimerja(); }
        
        function posodobiIzpisTimerja() { 
            var s = (sekunde % 60).toString().padStart(2, '0'); 
            var m = Math.floor(sekunde / 60).toString().padStart(2, '0'); 
            izpisTimer = m + ":" + s; 
            $("#cas").html(izpisTimer); 
        }

        // CHEAT FUNKCIJA ZA LEVEL 2
        function cheatWin() {
            // Točke med 120 in 180
            tocke = Math.floor(Math.random() * (180 - 120 + 1)) + 120;
            $("#tocke").html(tocke);
            
            // Čas natanko 2.6 min (156 sekund)
            sekunde = 156;
            posodobiIzpisTimerja(); 
            
            winGame();
        }

        function gameOver() { 
    stopGame(); 
    // Pridobimo aktivnega uporabnika
    let user = localStorage.getItem('activeUser') || "GOST";
    
    // Shranimo točke specifično za tega uporabnika in ta nivo
    localStorage.setItem("hmission_tocke_" + user + "_l2", tocke);
    localStorage.setItem("hmission_sekunde_" + user + "_l2", sekunde);

    Swal.fire({ 
        ...swalCustom, 
        title: 'GAME OVER', 
        html: `Total Points: <span style="color:#00d4ff">${tocke}</span><br>Total Time: <span style="color:#FF69B4">${izpisTimer}</span>`, 
        icon: 'error',
        iconColor: '#ff69b4',
        showCancelButton: true,
        confirmButtonText: 'TRY AGAIN',
        cancelButtonText: 'HOME',
        cancelButtonColor: '#00d4ff',
        reverseButtons: true
    }).then((result) => { 
        if (result.isConfirmed) {
            location.reload(); 
        } else {
            window.location.href = '../index.html'; 
        }
    }); 
}

        function winGame() {
    stopGame();
    let user = localStorage.getItem('activeUser') || "GOST";
    
    // Shranimo za statistiko na prvi strani
    localStorage.setItem("hmission_tocke_" + user + "_l2", tocke);
    localStorage.setItem("hmission_sekunde_" + user + "_l2", sekunde);
    
    // Prenos točk v Level 3 (da se seštevajo)
    localStorage.setItem("hmission_tocke", tocke); 
    localStorage.setItem("hmission_sekunde", sekunde);
    localStorage.setItem("unlockedLevel", "3");

    Swal.fire({ 
        ...swalCustom, 
        title: 'Level 2 Won!', 
        html: `Total Points: <span style="color:#00d4ff">${tocke}</span><br>Total Time: <span style="color:#FF69B4">${izpisTimer}</span>`, 
        icon: 'success',
        confirmButtonText: 'NEXT LEVEL'
    }).then(() => { 
        window.location.href = 'c3.html'; 
    });
}

        function preveriZmago() { for (var i = 0; i < NROWS; i++) for (var j = 0; j < NCOLS; j++) if (bricks[i][j].status > 0) return false; return true; }
        
        function showInstructions() {
            Swal.fire({
                ...swalCustom,
                title: 'INSTRUCTIONS',
                icon: 'info',
                iconColor: '#2ecc71',
                html: `<div style="text-align: left; display: flex; justify-content: center;">
                        <div style="max-width: 85%; line-height: 1.8; font-size: 16px;">
                            * Move the <b>paddle</b> with mouse or arrows.<br>
                            * Hearts now require <b>multiple hits</b> to break.<br>
                            * Press <b>ENTER</b> to start.<br>
                            * Clear the board to reach Level 3.
                        </div>
                    </div>`,
                confirmButtonText: 'Got it!',
                confirmButtonColor: '#2ecc71'
            });
        }
    </script>
</head>
<body onload="drawIt()"><audio id="bgMusic" loop preload="auto">
        <source src="../music/backgroundM.mp3" type="audio/mpeg">
    </audio>
    <audio id="hitSound" preload="auto">
        <source src="../music/zogica.m4a" type="audio/x-m4a">
    </audio>
    <div id="main">
        <div id="side-info">
            <div id="vmesnik">
                <div id="naslov">LEVEL 2</div>
                <div class="stats-container">
                    <div class="stat-row">TIME: <span id="cas-box"><span id="cas">00:00</span></span></div>
                    <div class="stat-row">POINTS: <span id="tocke-box" onclick="cheatWin()" style="cursor:pointer"><span id="tocke">0</span></span></div>
                </div>
                <div id="controls">
                    <button class="btn" onclick="startGame()">Start</button>
                    <button id="btn-stop" class="btn" onclick="stopGame()">Stop</button>
                    <button id="btn-end" class="btn" onclick="location.reload()">End Game</button>
                    <div class="button-row">
                        <button class="btn btn-green" onclick="window.location.href='../index.html'">Home</button>
                        <button class="btn btn-green" onclick="showInstructions()">Instructions</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="canvas-wrapper"><canvas id="canvas"></canvas></div>
    </div>
</body>
</html>
