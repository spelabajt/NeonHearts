<!DOCTYPE html>
<html>
<head>
    <title>Neon Pulse - Level 3</title>
    <link rel="icon" href="../img/icon.png">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body { height: 100% !important; margin: 0; padding: 0 !important; overflow: hidden !important; }
        body { background: #120a2a url('../img/ozadje.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 50px; height: 100%; }
        #side-info { width: 350px; display: flex; flex-direction: column; align-items: center; }
        #vmesnik { background: rgba(25, 10, 50, 0.85); padding: 20px 20px 35px 20px; border-radius: 20px; color: white; text-align: center; width: 100%; box-shadow: 0 0 20px rgba(181, 109, 255, 0.3); border: 1px solid rgba(181, 109, 255, 0.4); backdrop-filter: blur(5px); }
        #naslov { color: #b56dff; font-size: 32px; font-family: "Orbitron", sans-serif; text-shadow: 0 0 10px #8A2BE2, 0 0 20px #b56dff; margin-bottom: 25px; letter-spacing: 2px; }
        .stats-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .stat-row { font-size: 14px; font-family: "Orbitron", sans-serif; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        #cas-box, #tocke-box { border: 1px solid; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; display: inline-block; min-width: 60px; font-size: 14px; text-align: center; }
        #cas-box { border-color: #FF69B4; color: #FF69B4; }
        #tocke-box { border-color: #00d4ff; color: #00d4ff; }
        #controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 12px 25px; font-size: 18px; font-family: "Orbitron", sans-serif; font-weight: bold; background: transparent; border: 2px solid #b56dff; color: #b56dff; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; outline: none; }
        .btn:hover { background: #b56dff; color: white; box-shadow: 0 0 15px #b56dff; transform: translateY(-2px); }
        #btn-stop { border-color: #00d4ff; color: #00d4ff; }
        #btn-stop:hover { background: #00d4ff; color: #120a2a; }
        #btn-end { border-color: #FF69B4; color: #FF69B4; }
        #btn-end:hover { background: #FF69B4; color: white; }
        .btn-green { border-color: #2ecc71; color: #2ecc71; }
        .btn-green:hover { background: #2ecc71; color: #120a2a; box-shadow: 0 0 15px #2ecc71; }
        .button-row { display: flex; gap: 10px; width: 100%; }
        .button-row .btn { flex: 1; padding: 10px 5px; font-size: 13px; }
        #canvas-wrapper { padding: 20px; background: rgba(181, 109, 255, 0.1); border-radius: 30px; display: none; align-items: center; justify-content: center; }
        #canvas { display: block; background: hsl(250, 25%, 12%); border: 4px solid hsl(300, 70%, 55%); cursor: none; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
    </style>

<script type="application/javascript">
    var ctx, canvas, WIDTH, HEIGHT, intervalId, timerId;
    var x, y, r = 12, paddlex;
    var dx = 3, dy = -4; 
    var paddleh = 18;
    var initialPaddleW, targetPaddleW = 180, paddlew; 
    var bricks, NROWS = 3, NCOLS = 10, BRICKWIDTH, BRICKHEIGHT, PADDING = 5;
    
    var shranjeneTocke = parseInt(localStorage.getItem("hmission_tocke")) || 0;
    var shranjeneSekunde = parseInt(localStorage.getItem("hmission_sekunde")) || 0;

    var gameRunning = false, sekunde = shranjeneSekunde, tocke = shranjeneTocke, totalBricks;
    var izpisTimer = "00:00";
    
    var colors = { blue: "#00f2ff", pink: "#ff00ff", gray: "#555555" };
    var ballColor = colors.blue;
    var paddleColor = colors.blue;
    
    var rightPressed = false, leftPressed = false;
    var heartImgs = {};
    var loadedCount = 0;
    var required = ["s1", "s4"]; 

    // --- ZVOK KONFIGURACIJA ---
    var bgMusic = new Audio('../music/BackM.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.02;

    var hitSoundEffect = new Audio('../music/zogica.m4a');
    hitSoundEffect.preload = 'auto';

    function playHitSound() {
        var sound = hitSoundEffect.cloneNode();
        sound.volume = 0.9;
        sound.play().catch(e => console.log("Zvok blokiran"));
    }

    function loadAssets() {
        required.forEach(name => {
            var img = new Image();
            img.src = '../img_srce/' + name + '.png';
            img.onload = () => { loadedCount++; };
            heartImgs[name] = img;
        });
    }

    const swalCustom = { 
        background: 'rgba(25, 10, 50, 0.95)', color: '#fff', 
        confirmButtonColor: '#8A2BE2', backdrop: 'rgba(0,0,0,0.8)',
        scrollbarPadding: false, heightAuto: false
    };

    function drawIt() {
        loadAssets();
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth - 800; 
        canvas.height = window.innerHeight - 200;
        WIDTH = canvas.width; HEIGHT = canvas.height;
        
        BRICKWIDTH = ((WIDTH - 60) / NCOLS) - PADDING;
        BRICKHEIGHT = BRICKWIDTH;
        
        paddlew = WIDTH; 
        initialPaddleW = WIDTH;
        paddlex = 0;
        
        x = WIDTH / 2; y = HEIGHT - 60;
        initbricks();
        totalBricks = NROWS * NCOLS;

        $("#tocke").text(tocke);
        posodobiIzpisTimerja();

        $(document).keydown(function(e) {
            if (e.keyCode == 39) rightPressed = true;
            else if (e.keyCode == 37) leftPressed = true;
            else if (e.keyCode == 13) startGame();
            else if (e.keyCode == 32) { 
                e.preventDefault(); 
                if (gameRunning) stopGame(); 
                else startGame();
            }
            else if (e.keyCode == 38) { if (ballColor === colors.blue) paddleColor = colors.blue; }
            else if (e.keyCode == 40) { if (ballColor === colors.pink) paddleColor = colors.pink; }
        });

        $(document).keyup(function(e) {
            if (e.keyCode == 39) rightPressed = false;
            else if (e.keyCode == 37) leftPressed = false;
        });
    }

    function initbricks() {
        bricks = new Array(NROWS);
        for (var i = 0; i < NROWS; i++) {
            bricks[i] = new Array(NCOLS);
            for (var j = 0; j < NCOLS; j++) {
                bricks[i][j] = { status: 1, imgName: (Math.random() > 0.5 ? "s1" : "s4") };
            }
        }
    }

    function updatePaddleSize() {
        var staraSirina = paddlew;
        var tockeVTejStopnji = tocke - shranjeneTocke;
        var remaining = totalBricks - tockeVTejStopnji;

        if (remaining <= 5) {
            paddlew = targetPaddleW;
        } else {
            var step = (initialPaddleW - targetPaddleW) / (totalBricks - 5);
            paddlew = initialPaddleW - (tockeVTejStopnji * step);
        }

        if (!gameRunning && !rightPressed && !leftPressed) {
            paddlex = (WIDTH / 2) - (paddlew / 2);
        } else {
            var razlika = staraSirina - paddlew;
            paddlex += razlika / 2;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        updatePaddleSize();

        if (rightPressed && paddlex < WIDTH - paddlew) paddlex += 9;
        else if (leftPressed && paddlex > 0) paddlex -= 9;
        
        if (paddlex + paddlew > WIDTH) paddlex = WIDTH - paddlew;
        if (paddlex < 0) paddlex = 0;

        var hit = false;
        for (var i = 0; i < NROWS; i++) {
            for (var j = 0; j < NCOLS; j++) {
                var b = bricks[i][j];
                if (b.status == 1) {
                    var bx = 30 + j * (BRICKWIDTH + PADDING);
                    var by = 30 + i * (BRICKHEIGHT + PADDING);
                    
                    if(heartImgs[b.imgName]) {
                        ctx.drawImage(heartImgs[b.imgName], bx, by, BRICKWIDTH, BRICKHEIGHT);
                    }
                    
                    if (x + r > bx && x - r < bx + BRICKWIDTH && y + r > by && y - r < by + BRICKHEIGHT) {
                        dy = -dy; 
                        dy *= 1.005; dx *= 1.005; 
                        b.status = 0; 
                        tocke++; 
                        $("#tocke").text(tocke);
                        
                        playHitSound(); // KLIC ZVOKA EFEKTA

                        ballColor = (b.imgName === "s1") ? colors.blue : colors.pink;
                        paddleColor = colors.gray; 
                        
                        if (preveriZmago()) { winGame(); return; }
                        hit = true; 
                        break;
                    }
                }
            }
            if (hit) break;
        }

        ctx.fillStyle = paddleColor;
        ctx.beginPath(); 
        ctx.roundRect(paddlex, HEIGHT - paddleh, paddlew, paddleh, 10); 
        ctx.fill();
        
        if (paddleColor === colors.gray) {
            ctx.fillStyle = "white";
            ctx.font = "bold 13px Orbitron";
            ctx.textAlign = "center";
            var hint = (ballColor === colors.blue) ? "PRESS ↑" : "PRESS ↓";
            ctx.fillText(hint, paddlex + paddlew/2, HEIGHT - 4);
        }

        ctx.save();
        var glowColor = (ballColor === colors.blue) ? "#00f2ff" : "#ff00ff";
        ctx.shadowBlur = 25;              
        ctx.shadowColor = glowColor;     
        
        ctx.beginPath();
        ctx.fillStyle = ballColor;       
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = (ballColor === colors.blue) ? "#E0FFFF" : "#FFF0FF";     
        ctx.lineWidth = 1.2;              
        ctx.stroke();
        ctx.restore(); 

        if (x + dx > WIDTH - r || x + dx < r) dx = -dx;
        if (y + dy < r) dy = -dy;
        
        else if (y + dy > HEIGHT - r - paddleh) {
            if (x > paddlex && x < paddlex + paddlew) {
                if (paddleColor !== ballColor) {
                    gameOver(); 
                } else {
                    dy = -dy;
                    paddleColor = colors.gray;
                }
            } else if (y + dy > HEIGHT - r) {
                gameOver();
            }
        }

        x += dx; 
        y += dy;
    }

    function startGame() { 
        if (!gameRunning && loadedCount >= 2) { 
            $("#canvas-wrapper").css("display", "flex"); 
            gameRunning = true; 
            
            // Predvajaj glasbo
            bgMusic.play().catch(e => {
                $(document).one('mousedown', function() { bgMusic.play(); });
            });

            clearInterval(intervalId);
            clearInterval(timerId);
            intervalId = setInterval(draw, 10); 
            timerId = setInterval(posodobiTimer, 1000); 
        } 
    }
    
    function stopGame() { 
        gameRunning = false; 
        clearInterval(intervalId); 
        clearInterval(timerId); 
       /* bgMusic.pause(); */// Ustavi glasbo ob pavzi
    }
    function posodobiTimer() { 
        sekunde++; 
        posodobiIzpisTimerja();
    }

    function posodobiIzpisTimerja() {
        var s = (sekunde % 60).toString().padStart(2, '0'); 
        var m = Math.floor(sekunde / 60).toString().padStart(2, '0'); 
        izpisTimer = m + ":" + s;
        $("#cas").text(izpisTimer); 
    }

    // CHEAT FUNKCIJA ZA LEVEL 3
    function cheatWin() {
        // Trenutne točke + naključno med 10 in 48
        tocke = shranjeneTocke + Math.floor(Math.random() * (48 - 10 + 1)) + 10;
        $("#tocke").text(tocke);
        
        // Čas med 3 in 4 minute (180 - 240 sekund)
        sekunde = Math.floor(Math.random() * (240 - 180 + 1)) + 180;
        posodobiIzpisTimerja();
        
        winGame();
    }

    function preveriZmago() { for(var i=0; i<NROWS; i++) for(var j=0; j<NCOLS; j++) if(bricks[i][j].status==1) return false; return true; }

    function gameOver() { 
    stopGame(); 
    // Pridobimo aktivnega uporabnika
    let user = localStorage.getItem('activeUser') || "GOST";
    
    // Shranimo točke specifično za tega uporabnika in ta nivo
    localStorage.setItem("hmission_tocke_" + user + "_l3", tocke);
    localStorage.setItem("hmission_sekunde_" + user + "_l3", sekunde);

    Swal.fire({ 
        ...swalCustom, 
        title: 'GAME OVER', 
        html: `Total Points: <span style="color:#00d4ff">${tocke}</span><br>Total Time: <span style="color:#FF69B4">${izpisTimer}</span>`, 
        icon: 'error',
        iconColor: '#ff69b4',
        showCancelButton: true,
        confirmButtonText: 'TRY AGAIN',
        cancelButtonText: 'HOME',
        cancelButtonColor: '#00d4ff',
        reverseButtons: true
    }).then((result) => { 
        if (result.isConfirmed) {
            location.reload(); 
        } else {
            window.location.href = '../index.html'; 
        }
    }); 
}

    function winGame() {
    stopGame();
    let user = localStorage.getItem('activeUser') || "GOST";
    
    // Shranimo končne rezultate za nivo 3
    localStorage.setItem("hmission_tocke_" + user + "_l3", tocke);
    localStorage.setItem("hmission_sekunde_" + user + "_l3", sekunde);
    
    // Posodobimo splošne točke (za vsak primer)
    localStorage.setItem("hmission_tocke", tocke); 
    localStorage.setItem("hmission_sekunde", sekunde);

    Swal.fire({ 
        ...swalCustom, 
        title: 'Mission Accomplished!', 
        html: `You completed all levels!<br><br>Final Points: <span style="color:#00d4ff">${tocke}</span><br>Final Time: <span style="color:#FF69B4">${izpisTimer}</span>`, 
        icon: 'success',
        iconColor: '#FF69B4',
        confirmButtonText: 'BACK TO MENU'
    }).then(() => { 
        window.location.href = '../index.html'; 
    });
}

    function endGame() { 
        stopGame(); 
        location.reload();
    }

    function showInstructions() {
        Swal.fire({
            ...swalCustom,
            title: 'INSTRUCTIONS',
            icon: 'info',
            iconColor: '#2ecc71',
            html: `<div style="text-align: left; display: flex; justify-content: center;"><div style="max-width: 85%; line-height: 1.8; font-size: 16px;">* Move the <b>paddle</b> with your <b>arrow keys</b>.<br>* Press <b>ENTER</b> to start.<br>* <b>COLOR MATCH:</b> Use <b style="color:#00f2ff">↑ (Blue)</b> or <b style="color:#ff00ff">↓ (Pink)</b> to match the ball color!<br>* Catching with the <b>wrong color</b> results in Game Over!</div></div>`,
            confirmButtonText: 'Got it!',
            confirmButtonColor: '#2ecc71'
        });
    }
</script>
</head>
<body onload="drawIt()">
    <div id="main">
        <div id="side-info">
            <div id="vmesnik">
                <div id="naslov">LEVEL 3</div>
                
                <div class="stats-container">
                    <div class="stat-row">TIME: <span id="cas-box"><span id="cas">00:00</span></span></div>
                    <div class="stat-row">POINTS: <span id="tocke-box" onclick="cheatWin()" style="cursor:pointer"><span id="tocke">0</span></span></div>
                </div>

                <div id="controls">
                    <button id="btn-start" class="btn" onclick="startGame()">Start</button>
                    <button id="btn-stop" class="btn" onclick="stopGame()">Stop</button>
                    <button id="btn-end" class="btn" onclick="endGame()">End Game</button>
                    <div class="button-row">
                        <button class="btn btn-green" onclick="window.location.href='../index.html'">Home</button>
                        <button class="btn btn-green" onclick="showInstructions()">Instructions</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>
</body>
</html>
